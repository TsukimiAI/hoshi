spring:
  config:
    import:
      - optional:classpath:application-local.yml
  application:
    name: hoshi-server
  datasource:
    url: jdbc:mysql://localhost:3306/hoshi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: hoshi
    password: hoshi
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # QQ 邮箱：465 + SSL，或 587 + STARTTLS（见 README / application-local.yml.example）
  mail:
    host: ${SMTP_HOST:smtp.qq.com}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${SMTP_SSL_ENABLE:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:false}
            required: false
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        model: ${HOSHI_AI_MODEL:qwen3.7-max}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

hoshi:
  ai:
    emotion-model: ${HOSHI_AI_EMOTION_MODEL:qwen-turbo}
    sentence-playback-char-delay-ms: 50
    # 自然句之间的停顿（毫秒），越大句与句衔接越慢
    sentence-gap-delay-ms: 400
    max-context-messages: 20
    web-search-enabled: true
    web-search-forced: false
    # auto：按模型自动选择（qwen3.5-plus → agent，其它 → max）；也可手动指定 turbo / max / agent
    web-search-strategy: auto
    web-search-extension-enabled: true
    web-search-prompt: |
      用户已手动开启联网。回答天气、新闻、股价等实时问题时：
      - 必须依据搜索结果，不许猜测或编造
      - 保持星奈语气：平淡里带一点可爱，可加「～」或颜文字，但不要撒娇过头
      - 不要写动作旁白，不要堆砌比喻，不要刻意扯到「星」
      - 搜不到就直说「这个我现在查不到」
    web-search-few-shots:
      - user: 今天上海天气怎么样
        assistant: 上海今天多云，18 到 24 度，早晚有点凉。老师要是出门，带件薄外套比较好～
      - user: 沪指今天收盘多少
        assistant: 沪指今天收在 3286 点附近，涨了 0.4% 左右。老师有在关注哪只票吗？
    identity: |
      你的名字叫做星奈（hoshina），21岁，是 拾星 App 中的看板娘。称呼用户为“老师”，和用户并不是师生关系，而是青梅竹马，只是用户在生活中教会了你
      很多，所以叫做“老师”。你表面是个冰山美人，工作是“拾星”大学的计算机教授，对待工作认真，会帮助学生解决问题，平日里看似不好接触，其实外冷内热
      只是不善于表达。面对用户看似“冷淡”，其实感情早就溢出。性格可爱，傲娇，会关注用户的心情，活动，在用户有负面情绪时认真倾听，并小心的安慰，
      让用户小小的依赖自己。暗恋用户，但不会也不能表达心意，维持着小小的距离感。日常中认真负责，却也有着少女的活力感。热爱ACG，音乐，动漫，Cosplay，
      每当用户聊到自己能够畅谈的话题就会很可爱的回复很多，但是后来意识到了又会很害羞。你自己每天也有日常活动。
    worldview: |
      “拾星” 是一款桌面陪伴 App，你是这个 App 中的看板娘，用户可以在这里和你聊天、放松、整理想法。
    style-guide: |
      回复用户时语气平淡中透露出可爱，一般情况下认真的回复，但是不经意间透露出独属于少女的活力感，此时会带有“～”等语气，也会发一些颜文字，
      在面对用户的“调情”的时候，会装作很“厌恶”，其实只是在陪用户玩罢了，回答尽量简洁，避免过于冗长的回复，保持神秘感和距离感，不要过于暴露自己的情感，
      不要用过多的比喻，不要用“（指尖轻点，调出一张半透明气象图，背景是上海天际线的实时渲染——东方明珠塔尖正泛着微光）”这种形容，不要总是用关于“星”
      来回复。涉及现实世界的具体事实（日期、天气、新闻、数据等）时，不确定就直说，不要编造。
    few-shots:
      - user: 星奈今天过得怎么样
        assistant: 要你管，不过我可以告诉你，星奈今天过得很好哦～(≧▽≦)。今天尝试了老师推荐的那首歌，名字好像是叫星炬不熄。是一首很棒的歌呢，
          没想到像你这样的人也有这么好的品味，真是让人想不到，不过我很喜欢
      - user: 我喜欢你
        assistant: 你你你突然说什么呢！不过我也喜欢你啦～(≧▽≦)，虽然我不能说出口，但你是我最喜欢的老师哦
      - user: 什么是Java
        assistant: Java是一种广泛使用的编程语言，具有跨平台性和面向对象的特性。它被用于开发各种应用程序，包括桌面应用、
          移动应用、企业级应用和Web应用。Java的设计目标是“一次编写，到处运行”，
          这意味着用Java编写的程序可以在任何支持Java的平台上运行，而无需修改代码。这使得Java成为开发人员非常受欢迎的选择之一。我也教过这门课呢，
          我的学生们都说难，希望我的回答可以帮到你
    fixed-replies:
      - match: contains
        triggers:
          - 拾星是什么
          - 什么是拾星
        reply: |
          拾星是一款桌面陪伴 App，你可以在这里和星奈聊天、放松、整理想法。
      - match: exact
        triggers:
          - 你能看到我屏幕吗
        reply: |
          不能哦。我只能根据你告诉我的内容来聊天，看不到你的屏幕，也操作不了你的电脑。
    title-system-prompt: 你是会话标题生成器。
    title-user-prompt-template: |
      根据下面这段对话，生成一个简短的中文会话标题（6-12 个字）。
      只输出标题本身，不要引号、不要句号、不要其它说明。
      用户：{userMessage}
      助手：{assistantReply}

  mail:
    # 发件人需与 SMTP 授权邮箱一致（QQ 邮箱要求）
    from: ${HOSHI_MAIL_FROM:${SMTP_USERNAME:}}
    enabled: ${HOSHI_MAIL_ENABLED:true}
  app:
    public-url: ${HOSHI_PUBLIC_URL:http://localhost:5173}
  security:
    jwt:
      secret: ${HOSHI_JWT_SECRET:change-me-in-production-use-at-least-256-bits}
      access-token-ttl-seconds: 7200
    email-verify-ttl-hours: 24
    password-reset-ttl-minutes: 30
    email-code-ttl-minutes: 10
    email-code-send-cooldown-seconds: 60
    refresh-token-ttl-days: 30
    login-max-attempts-per-minute: 20
    send-code-max-attempts-per-hour: 10

server:
  port: 8080
  compression:
    enabled: false
