spring:
  application:
    name: hoshi-server
  datasource:
    url: jdbc:mysql://localhost:3306/hoshi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: hoshi
    password: hoshi
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

hoshi:
  security:
    jwt:
      secret: ${HOSHI_JWT_SECRET:change-me-in-production-use-at-least-256-bits}
      access-token-ttl-seconds: 7200

server:
  port: 8080
