spring:
  datasource:
    url: jdbc:h2:mem:hoshi-redis;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.mail.autoconfigure.MailSenderAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379

hoshi:
  mail:
    enabled: false
  app:
    public-url: http://localhost:5173
  security:
    jwt:
      secret: test-secret-key-for-unit-tests-at-least-256-bits-long
